categories:
  clubmanagerLogin:
    label: 'Clubmanager Login'

settings:
  clubmanagerLogin.storagePid:
    label: 'FE User Storage PID'
    description: 'Storage folder/page for frontend users used by fe_login.'
    category: clubmanagerLogin
    type: int
    default: 0
  clubmanagerLogin.loginFormPid:
    label: 'Login Page PID'
    description: 'Page UID where the login form is rendered.'
    category: clubmanagerLogin
    type: int
    default: 0
  clubmanagerLogin.memberProfilePage:
    label: 'Member Profile Page PID'
    description: 'Target page for the profile button for logged-in users.'
    category: clubmanagerLogin
    type: int
    default: 0
  clubmanagerLogin.emailFrom:
    label: 'Email From'
    description: 'Default sender email for frontend login mails.'
    category: clubmanagerLogin
    type: string
    default: 'demo@clubmanager.software'
  clubmanagerLogin.emailFromName:
    label: 'Email From Name'
    description: 'Default sender name for frontend login mails.'
    category: clubmanagerLogin
    type: string
    default: 'Clubmanager Demo'
  clubmanagerLogin.replyToEmail:
    label: 'Reply-To Email'
    description: 'Default reply-to address for frontend login mails.'
    category: clubmanagerLogin
    type: string
    default: 'post@quicko.software'
  clubmanagerLogin.redirectPageLogout:
    label: 'Logout Target PID'
    description: 'Target page for the logout link.'
    category: clubmanagerLogin
    type: int
    default: 10
  clubmanagerLogin.label.login:
    label: 'Login Label'
    category: clubmanagerLogin
    type: string
    default: 'Login'
  clubmanagerLogin.label.profile:
    label: 'Profile Label'
    category: clubmanagerLogin
    type: string
    default: 'Profil'
  clubmanagerLogin.label.logout:
    label: 'Logout Label'
    category: clubmanagerLogin
    type: string
    default: 'Logout'
